name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          sed -i "s|__YS3_ACCESS_KEY__|${{ secrets.YS3_ACCESS_KEY }}|g" config.js
          sed -i "s|__YS3_SECRET_KEY__|${{ secrets.YS3_SECRET_KEY }}|g" config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
